apiVersion: apps/v1
kind: Deployment
metadata:
  name: pasindujayasinghe.com-app
  namespace: default
  labels:
    app: pasindujayasinghe.com-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pasindujayasinghe.com-app
  template:
    metadata:
      labels:
        app: pasindujayasinghe.com-app
    spec:
      containers:
        - name: portfolio
          image: ghcr.io/pasinduljay/pasindujayasinghe.com:8902284
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-db-secret
                  key: DATABASE_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: portfolio-db-secret
                  key: NEXTAUTH_SECRET
            - name: NEXTAUTH_URL
              value: "https://pasindujayasinghe.com"
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20

---

apiVersion: v1
kind: Service
metadata:
  name: pasindujayasinghe.com-app
  namespace: default
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: pasindujayasinghe.com-app
