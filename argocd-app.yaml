apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-website
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/pasinduljay/pasindujayasinghe.com-manifest.git'
    targetRevision: main
    path: .
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
