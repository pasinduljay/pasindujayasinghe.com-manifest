apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-db
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-db
  template:
    metadata:
      labels:
        app: portfolio-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: portfolio-db-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: portfolio-db-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: portfolio-db-secret
              key: POSTGRES_DB
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: portfolio-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: default
spec:
  selector:
    app: portfolio-db
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
